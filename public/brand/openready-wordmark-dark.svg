    <linearGradient id="orw-tile-d" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b7df6"/>
      <stop offset="1" stop-color="#9d8bfa"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14.5" fill="url(#orw-tile-d)"/>
  <circle cx="32" cy="32" r="18.75" stroke="#ffffff" stroke-opacity="0.28" stroke-width="5.5"/>
  <circle cx="32" cy="32" r="18.75" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"
