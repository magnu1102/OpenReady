name: "OpenReady"
description: "Analyze GitHub repositories for portfolio readiness, gate CI on OpenReady scores, and generate score badges."
author: "Magnus Almås"
branding:
  icon: "check-circle"
  color: "green"

# Composite action wrapping the committed CLI bundle (dist-cli/openready.mjs).
# Zero install: it only needs Node 20+ on the runner, which every GitHub-hosted
# runner ships. See docs/github-action.md for the full reference.

inputs:
  username:
    description: "GitHub username whose public repositories are analyzed"
    required: true
  repo:
    description: "Focus a single repository by name (case-insensitive name or owner/name)"
    default: ""
  token:
    description: "GitHub token for API requests (avoids the ~60/hour unauthenticated limit)"
    default: ${{ github.token }}
  fail-under:
    description: "Fail the action if any analyzed repository scores below this (0-100)"
    default: ""
  require-checks:
    description: "Comma- or space-separated custom check ids that must pass for every repository"
    default: ""
  profile:
    description: "Path to an openready.profile.v1 JSON file"
    default: ""
  limit:
    description: "Maximum repositories to analyze"
    default: "30"
  no-readme:
    description: "Skip README fetches (\"true\" to enable)"
    default: "false"
  no-tree:
    description: "Skip file-tree fetches (\"true\" to enable)"
    default: "false"
  report-path:
    description: "Where to write the openready.export.v1 JSON report"
    default: "openready-report.json"
  badge:
    description: "Badge generation: \"false\", \"true\" (both formats), \"endpoint\", or \"svg\""
    default: "false"
  badge-path:
    description: "Badge base path; the .json/.svg extension is appended"
    default: "openready-badge"
  badge-label:
    description: "Badge label text"
    default: "openready"

outputs:
  score:
    description: "Score shown on the badge (single repository, or rounded average); empty when unavailable"
    value: ${{ steps.badge-data.outputs.score }}
  color:
    description: "shields.io color for the score"
    value: ${{ steps.badge-data.outputs.color }}
  gate-passed:
    description: "\"false\" when the CI gate failed (CLI exit 4), otherwise \"true\""
    value: ${{ steps.analyze.outputs.gate-passed }}
  report-path:
    description: "Path of the JSON report"
    value: ${{ steps.analyze.outputs.report-path }}
  badge-endpoint-path:
    description: "Path of the endpoint JSON badge; empty when not generated"
    value: ${{ steps.badge.outputs.endpoint-path }}
  badge-svg-path:
    description: "Path of the SVG badge; empty when not generated"
    value: ${{ steps.badge.outputs.svg-path }}

runs:
  using: "composite"
  steps:
    # Exit 4 (gate failed) is captured instead of failing here, so the report,
    # badges, and outputs are still produced; the final step fails the action.
    # Any other non-zero exit aborts immediately.
    - id: analyze
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        OPENREADY_CLI: ${{ github.action_path }}/dist-cli/openready.mjs
        IN_USERNAME: ${{ inputs.username }}
        IN_REPO: ${{ inputs.repo }}
        IN_FAIL_UNDER: ${{ inputs.fail-under }}
        IN_REQUIRE_CHECKS: ${{ inputs.require-checks }}
        IN_PROFILE: ${{ inputs.profile }}
        IN_LIMIT: ${{ inputs.limit }}
        IN_NO_README: ${{ inputs.no-readme }}
        IN_NO_TREE: ${{ inputs.no-tree }}
        IN_REPORT_PATH: ${{ inputs.report-path }}
      run: |
        mkdir -p "$(dirname "$IN_REPORT_PATH")"
        args=(analyze "$IN_USERNAME" --format json --out "$IN_REPORT_PATH" --limit "$IN_LIMIT")
        if [ -n "$IN_REPO" ]; then
          args+=(--repo "$IN_REPO")
        fi
        if [ -n "$IN_FAIL_UNDER" ]; then
          args+=(--fail-under "$IN_FAIL_UNDER")
        fi
        if [ -n "$IN_PROFILE" ]; then
          args+=(--profile "$IN_PROFILE")
        fi
        if [ "$IN_NO_README" = "true" ]; then
          args+=(--no-readme)
        fi
        if [ "$IN_NO_TREE" = "true" ]; then
          args+=(--no-tree)
        fi
        for id in $(echo "$IN_REQUIRE_CHECKS" | tr ',' ' '); do
          args+=(--require-check "$id")
        done
        set +e
        node "$OPENREADY_CLI" "${args[@]}"
        code=$?
        set -e
        echo "report-path=$IN_REPORT_PATH" >> "$GITHUB_OUTPUT"
        if [ "$code" -eq 0 ]; then
          echo "gate-passed=true" >> "$GITHUB_OUTPUT"
        elif [ "$code" -eq 4 ]; then
          echo "gate-passed=false" >> "$GITHUB_OUTPUT"
        else
          exit "$code"
        fi

    - id: badge
      shell: bash
      env:
        OPENREADY_CLI: ${{ github.action_path }}/dist-cli/openready.mjs
        IN_BADGE: ${{ inputs.badge }}
        IN_BADGE_PATH: ${{ inputs.badge-path }}
        IN_BADGE_LABEL: ${{ inputs.badge-label }}
        IN_REPO: ${{ inputs.repo }}
        IN_REPORT_PATH: ${{ inputs.report-path }}
      run: |
        if [ "$IN_BADGE" = "false" ] || [ -z "$IN_BADGE" ]; then
          exit 0
        fi
        mkdir -p "$(dirname "$IN_BADGE_PATH")"
        args=(badge --from "$IN_REPORT_PATH" --label "$IN_BADGE_LABEL")
        if [ -n "$IN_REPO" ]; then
          args+=(--repo "$IN_REPO")
        fi
        if [ "$IN_BADGE" = "true" ] || [ "$IN_BADGE" = "endpoint" ]; then
          node "$OPENREADY_CLI" "${args[@]}" --format endpoint --out "$IN_BADGE_PATH.json"
          echo "endpoint-path=$IN_BADGE_PATH.json" >> "$GITHUB_OUTPUT"
        fi
        if [ "$IN_BADGE" = "true" ] || [ "$IN_BADGE" = "svg" ]; then
          node "$OPENREADY_CLI" "${args[@]}" --format svg --out "$IN_BADGE_PATH.svg"
          echo "svg-path=$IN_BADGE_PATH.svg" >> "$GITHUB_OUTPUT"
        fi

    # score/color come from the same unit-tested badge module the badges use,
    # via a throwaway endpoint badge in the runner temp dir.
    - id: badge-data
      shell: bash
      env:
        OPENREADY_CLI: ${{ github.action_path }}/dist-cli/openready.mjs
        IN_REPO: ${{ inputs.repo }}
        IN_REPORT_PATH: ${{ inputs.report-path }}
      run: |
        tmp="$RUNNER_TEMP/openready-score.json"
        args=(badge --from "$IN_REPORT_PATH" --format endpoint --out "$tmp")
        if [ -n "$IN_REPO" ]; then
          args+=(--repo "$IN_REPO")
        fi
        node "$OPENREADY_CLI" "${args[@]}"
        node -e '
          const badge = JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"));
          const match = /^(\d+)\/100$/.exec(badge.message);
          console.log(`score=${match ? match[1] : ""}`);
          console.log(`color=${badge.color}`);
        ' "$tmp" >> "$GITHUB_OUTPUT"

    - id: enforce-gate
      shell: bash
      env:
        GATE_PASSED: ${{ steps.analyze.outputs.gate-passed }}
      run: |
        if [ "$GATE_PASSED" = "false" ]; then
          echo "::error::OpenReady gate failed — see the analyze step log for the violations."
          exit 1
        fi
