name: lint-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-and-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript (app)
        run: pnpm typecheck

      - name: TypeScript (CLI)
        run: pnpm typecheck:cli

      - name: Vitest
        run: pnpm test

      - name: Frontend build
        run: pnpm build

      - name: CLI bundle
        run: pnpm build:cli

      # The bundle is committed so the composite action (action.yml) can run it
      # with zero install. Rebuild and diff to catch a stale artifact.
      - name: CLI bundle is up to date
        run: git diff --exit-code -- dist-cli/ || (echo "dist-cli/ is stale — run 'pnpm build:cli' and commit the result." && exit 1)
