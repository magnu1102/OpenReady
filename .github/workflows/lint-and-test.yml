name: lint-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-and-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version comes from package.json#packageManager
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript (app)
        run: pnpm typecheck

      - name: TypeScript (CLI)
        run: pnpm typecheck:cli

      - name: Vitest
        run: pnpm test

      - name: Frontend build
        run: pnpm build

      - name: CLI bundle
        run: pnpm build:cli

      # The bundle is committed so the composite action (action.yml) can run it
      # with zero install. Rebuild and diff to catch a stale artifact.
      - name: CLI bundle is up to date
        run: git diff --exit-code -- dist-cli/ || (echo "dist-cli/ is stale — run 'pnpm build:cli' and commit the result." && exit 1)

  rust:
    name: Rust checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # tauri::generate_context! embeds ../dist at compile time; stub it so the
      # Rust checks don't pay for a full frontend build.
      - name: Stub frontend dist
        run: mkdir -p dist && touch dist/index.html
        shell: bash

      - name: rustfmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
        working-directory: src-tauri

      - name: Tests
        run: cargo test --locked
        working-directory: src-tauri

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version comes from package.json#packageManager
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Uses the runner's preinstalled Edge (channel: msedge) — no browser download.
      - name: Playwright smoke
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
