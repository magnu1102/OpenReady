name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please do not include secrets
        (such as GitHub tokens) in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run ..., I expected ... but got ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps so we can see it too.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - Desktop app (Tauri)
        - CLI
        - Both
        - Not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS and version, Node/pnpm version, and the OpenReady version (or commit).
      placeholder: |
        OS: macOS 14.5
        Node: 20.11, pnpm: 9.1
        OpenReady: v0.1.0 (or commit sha)
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Relevant output, stack traces, or screenshots (redact tokens).
    validations:
      required: false
