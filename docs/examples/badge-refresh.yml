# Refresh the OpenReady score badge on every push to main and commit it back.
# Copy to .github/workflows/openready-badge.yml in your repository and adjust
# `username` and `repo`. Reference the badge from your README:
#
#   ![OpenReady](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/OWNER/REPO/main/.github/badges/openready.json)
#
# or, without shields.io, embed the static SVG directly:
#
#   ![OpenReady](.github/badges/openready.svg)

name: openready-badge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Analyze and generate badges
        uses: magnu1102/OpenReady@v0.3.0
        with:
          username: OWNER # ← your GitHub user or organization
          repo: REPO # ← this repository's name
          badge: "true"
          badge-path: .github/badges/openready
          report-path: ${{ runner.temp }}/openready-report.json

      - name: Commit the badge if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/
          git diff --cached --quiet || (git commit -m "chore: refresh OpenReady badge" && git push)
